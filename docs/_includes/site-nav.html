<nav class="site-nav" aria-label="Primary">
  <ul>
    {% for path in site.header_pages %}
      {% assign nav_page = site.pages | where: "path", path | first %}
      {% if nav_page %}
        <li>
          <a href="{{ nav_page.url | relative_url }}"{% if page.url == nav_page.url %} aria-current="page"{% endif %}>
            {{ nav_page.title }}
          </a>
        </li>
      {% endif %}
    {% endfor %}
  </ul>
</nav>
