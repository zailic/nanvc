<nav class="site-nav" aria-label="Primary">
  <ul class="site-nav__list">
    {% for path in site.header_pages %}
      {% assign nav_page = site.pages | where: "path", path | first %}
      {% if nav_page %}
        <li class="site-nav__item">
          <a href="{{ nav_page.url | relative_url }}"{% if page.url == nav_page.url %} aria-current="page"{% endif %}>
            {{ nav_page.title }}
          </a>
        </li>
      {% endif %}
    {% endfor %}
    <li class="site-nav__more" hidden>
      <button class="site-nav__more-button" type="button" aria-expanded="false" aria-haspopup="true">
        More...
      </button>
      <ul class="site-nav__more-menu" aria-label="More pages"></ul>
    </li>
  </ul>
</nav>
