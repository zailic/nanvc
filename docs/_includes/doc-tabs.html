{% assign default_tab = include.default_tab | default: 1 %}

<div class="doc-tabs doc-tabs--{{ include.id }}">
  <input {% if default_tab == 1 %}checked{% endif %} id="{{ include.id }}-tab-1" name="{{ include.id }}-tabs" type="radio">
  <input {% if default_tab == 2 %}checked{% endif %} id="{{ include.id }}-tab-2" name="{{ include.id }}-tabs" type="radio">

  <div class="doc-tabs__nav" role="tablist" aria-label="{{ include.aria_label | default: 'Documentation tabs' }}">
    <label for="{{ include.id }}-tab-1" role="tab" aria-controls="{{ include.id }}-panel-1">{{ include.label_one }}</label>
    <label for="{{ include.id }}-tab-2" role="tab" aria-controls="{{ include.id }}-panel-2">{{ include.label_two }}</label>
  </div>

  <div class="doc-tabs__panel" id="{{ include.id }}-panel-1">
    {{ include.panel_one }}
  </div>

  <div class="doc-tabs__panel" id="{{ include.id }}-panel-2">
    {{ include.panel_two }}
  </div>
</div>

<style>
  #{{ include.id }}-tab-1:checked ~ .doc-tabs__nav label[for="{{ include.id }}-tab-1"],
  #{{ include.id }}-tab-2:checked ~ .doc-tabs__nav label[for="{{ include.id }}-tab-2"] {
    background: var(--accent);
    color: white;
  }

  #{{ include.id }}-tab-1:checked ~ #{{ include.id }}-panel-1,
  #{{ include.id }}-tab-2:checked ~ #{{ include.id }}-panel-2 {
    display: block;
  }
</style>
